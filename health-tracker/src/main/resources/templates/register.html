<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">Create Account</h3>
                    <p class="text-danger" th:if="${error}" th:text="${error}"></p>
                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Full Name"/>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Email"/>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Password"/>
                        </div>
                        <div class="mb-3">
                            <input type="number" class="form-control" th:field="*{age}" placeholder="Age"/>
                        </div>
                        <div class="mb-3">
                            <select class="form-select" th:field="*{gender}">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="number" class="form-control" th:field="*{height}" placeholder="Height (cm)"/>
                        </div>
                        <div class="mb-3">
                            <input type="number" class="form-control" th:field="*{weight}" placeholder="Weight (kg)"/>
                        </div>
                        <div class="mb-3">
                            <select class="form-select" th:field="*{activityLevel}">
                                <option value="SEDENTARY">Sedentary</option>
                                <option value="LIGHT">Light</option>
                                <option value="MODERATE">Moderate</option>
                                <option value="ACTIVE">Active</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                    <p class="text-center mt-3">Already have an account? <a href="/login">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
