<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard/{id}(id=${user.id})}">Health Tracker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/dashboard/{id}(id=${user.id})}">Dashboard</a>
            <a class="nav-link" th:href="@{/meals/{id}(id=${user.id})}">Meals</a>
            <a class="nav-link" th:href="@{/progress/{id}(id=${user.id})}">Progress</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h4 th:text="'Welcome back, ' + ${user.name} + '!'"></h4>
    <div class="row mt-3">
        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <h6 class="text-muted">Daily Calorie Target</h6>
                <h2 class="text-primary" th:text="${tdee} + ' kcal'"></h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <h6 class="text-muted">Calories Consumed Today</h6>
                <h2 class="text-success" th:text="${caloriesConsumed} + ' kcal'"></h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <h6 class="text-muted">BMI</h6>
                <h2 class="text-warning" th:text="${bmi}"></h2>
            </div>
        </div>
    </div>
    <div class="card shadow mt-4">
        <div class="card-body">
            <h5>Meals Eaten Today</h5>
            <p class="text-muted" th:if="${meals == null or meals.empty}">No meals logged today.</p>
            <ul class="list-group" th:if="${meals != null and !meals.empty}">
                <li class="list-group-item" th:each="meal : ${meals}"
                    th:text="${meal.name} + ' - ' + ${meal.calories} + ' kcal'">
                </li>
            </ul>
            <a th:href="@{/meals/{id}(id=${user.id})}" class="btn btn-primary mt-3">Log a Meal</a>
        </div>
    </div>
</div>
</body>
</html>
