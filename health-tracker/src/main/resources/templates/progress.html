<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Progress</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard/{id}(id=${user.id})}">Health Tracker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/dashboard/{id}(id=${user.id})}">Dashboard</a>
            <a class="nav-link" th:href="@{/meals/{id}(id=${user.id})}">Meals</a>
            <a class="nav-link" th:href="@{/progress/{id}(id=${user.id})}">Progress</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row mt-3">
        <div class="col-md-6">
            <div class="card shadow text-center p-3">
                <h6 class="text-muted">Days Completed</h6>
                <h2 class="text-primary" th:text="${progress.totalDaysCompleted}"></h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow text-center p-3">
                <h6 class="text-muted">Current Weight</h6>
                <h2 class="text-success" th:text="${user.weight} + ' kg'"></h2>
            </div>
        </div>
    </div>
    <div class="card shadow mt-4">
        <div class="card-body">
            <h5>Daily Check-In</h5>
            <p class="text-muted">Mark today as completed</p>
            <form th:action="@{/progress/{id}/checkin(id=${user.id})}" method="post">
                <button type="submit" class="btn btn-primary">Check In Today</button>
            </form>
        </div>
    </div>
    <div class="card shadow mt-4" th:if="${progress.weeklyUpdateUnlocked}">
        <div class="card-body">
            <h5>Weekly Update</h5>
            <p class="text-muted">You have completed 7 days — update your stats!</p>
            <form th:action="@{/progress/{id}/update(id=${user.id})}" method="post">
                <div class="mb-3">
                    <input type="number" class="form-control" name="newWeight" placeholder="New weight (kg)"/>
                </div>
                <div class="mb-3">
                    <select class="form-select" name="newActivityLevel">
                        <option value="SEDENTARY">Sedentary</option>
                        <option value="LIGHT">Light</option>
                        <option value="MODERATE">Moderate</option>
                        <option value="ACTIVE">Active</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Update</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
