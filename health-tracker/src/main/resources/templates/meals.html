<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Meals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/user/dashboard">Health Tracker</a>
		<div class="navbar-nav ms-auto">
		    <a class="nav-link" href="/user/dashboard">Dashboard</a>
		    <a class="nav-link" href="/user/meals">Meals</a>
		    <a class="nav-link" href="/user/progress">Progress</a>
		    <a class="nav-link" href="/logout">Logout</a>
		</div>
    </div>
</nav>
<div class="container mt-4">
    <div class="card shadow mb-4">
        <div class="card-body">
            <h5>Log a Meal</h5>
				<form action="/user/meals/add" th:object="${newMeal}" method="post">                <div class="mb-3">
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Meal name"/>
                </div>
                <div class="mb-3">
                    <input type="number" class="form-control" th:field="*{calories}" placeholder="Calories"/>
                </div>
                <div class="mb-3">
                    <select class="form-select" th:field="*{mealType}">
                        <option value="BREAKFAST">Breakfast</option>
                        <option value="LUNCH">Lunch</option>
                        <option value="DINNER">Dinner</option>
                        <option value="SNACK">Snack</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Meal</button>
            </form>
        </div>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <h5>Today's Meals</h5>
            <p class="text-muted" th:if="${meals.empty}">No meals logged today.</p>
            <table class="table" th:if="${!meals.empty}">
                <thead>
                    <tr>
                        <th>Meal</th>
                        <th>Type</th>
                        <th>Calories</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="meal : ${meals}">
                        <td th:text="${meal.name}"></td>
                        <td th:text="${meal.mealType}"></td>
                        <td th:text="${meal.calories} + ' kcal'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
